<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>学校 Excel 导入</title>
  <style>
    :root {
      --bg: #f3f6f4;
      --ink: #1a2e24;
      --muted: #5a6f64;
      --accent: #1f6b4a;
      --accent-soft: #d8efe4;
      --line: #c9d8d0;
      --card: #ffffff;
      --danger: #9b2c2c;
      --ok: #1f6b4a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Source Han Sans SC", "Noto Sans SC", "PingFang SC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 420px at 10% -10%, #dff0e7 0%, transparent 55%),
        radial-gradient(700px 360px at 100% 0%, #e8eef5 0%, transparent 50%),
        var(--bg);
    }
    main {
      width: min(640px, calc(100% - 2rem));
      margin: 4rem auto;
      padding: 2rem;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
    }
    h1 {
      margin: 0 0 0.4rem;
      font-size: 1.6rem;
      letter-spacing: 0.02em;
    }
    .sub {
      margin: 0 0 1.5rem;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .hint {
      margin: 0 0 1.25rem;
      padding: 0.85rem 1rem;
      background: var(--accent-soft);
      border-radius: 8px;
      color: var(--ink);
      font-size: 0.9rem;
      line-height: 1.55;
    }
    label.file {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem;
      border: 1.5px dashed var(--line);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    label.file:hover {
      border-color: var(--accent);
      background: #f7fbf9;
    }
    label.file input { display: none; }
    .file-name {
      color: var(--muted);
      font-size: 0.92rem;
      word-break: break-all;
    }
    .actions {
      margin-top: 1.25rem;
      display: flex;
      gap: 0.75rem;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 0.7rem 1.2rem;
      font-size: 0.95rem;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    #msg {
      margin-top: 1rem;
      min-height: 1.4rem;
      font-size: 0.92rem;
      line-height: 1.5;
    }
    #msg.ok { color: var(--ok); }
    #msg.err { color: var(--danger); }
    .progress-wrap {
      display: none;
      margin-top: 1rem;
    }
    .progress-wrap.visible { display: block; }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.35rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .progress-track {
      height: 8px;
      border-radius: 999px;
      background: #e2ebe6;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #1f6b4a, #2f9b6a);
      transition: width 0.15s ease;
    }
    .progress-bar.indeterminate {
      width: 35% !important;
      animation: progress-indeterminate 1.1s ease-in-out infinite;
    }
    @keyframes progress-indeterminate {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(320%); }
    }
  </style>
</head>
<body>
  <main>
    <h1>学校 Excel 导入</h1>
    <p class="sub">上传 .xlsx / .xls，将学校名称写入 school 表。刷新页面可恢复进度。</p>
    <div class="hint">
      表头需包含「名称」「学校名称」或「name」列；从第二行起为数据。单文件不超过 5MB。
    </div>
    <form id="form">
      <label class="file">
        <span>选择 Excel 文件</span>
        <span class="file-name" id="fileName">未选择文件</span>
        <input id="file" type="file" name="file" accept=".xlsx,.xls,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" required />
      </label>
      <div class="actions">
        <button type="submit" id="submitBtn">开始导入</button>
      </div>
    </form>
    <div id="msg" aria-live="polite"></div>
    <div id="progress" class="progress-wrap" aria-hidden="true">
      <div class="progress-meta">
        <span id="progressLabel">上传中</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-track">
        <div id="progressBar" class="progress-bar"></div>
      </div>
    </div>
  </main>
  <script>
    (function () {
      var TASK_KEY = "myreport:importTask:school";
      var form = document.getElementById("form");
      var fileInput = document.getElementById("file");
      var fileName = document.getElementById("fileName");
      var submitBtn = document.getElementById("submitBtn");
      var msg = document.getElementById("msg");
      var progress = document.getElementById("progress");
      var progressBar = document.getElementById("progressBar");
      var progressPct = document.getElementById("progressPct");
      var progressLabel = document.getElementById("progressLabel");

      function setProgress(visible, pct, label, indeterminate) {
        progress.classList.toggle("visible", !!visible);
        progress.setAttribute("aria-hidden", visible ? "false" : "true");
        if (!visible) {
          progressBar.classList.remove("indeterminate");
          progressBar.style.width = "0%";
          progressPct.textContent = "0%";
          progressLabel.textContent = "上传中";
          return;
        }
        progressLabel.textContent = label || "上传中";
        if (indeterminate) {
          progressBar.classList.add("indeterminate");
          progressPct.textContent = "";
        } else {
          progressBar.classList.remove("indeterminate");
          var p = Math.max(0, Math.min(100, Math.round(pct || 0)));
          progressBar.style.width = p + "%";
          progressPct.textContent = p + "%";
        }
      }

      function saveTask(id) {
        try {
          if (id) sessionStorage.setItem(TASK_KEY, id);
          else sessionStorage.removeItem(TASK_KEY);
        } catch (e) {}
      }

      function poll(taskId, fromResume) {
        saveTask(taskId);
        function tick() {
          fetch("/school/importProgress?taskId=" + encodeURIComponent(taskId))
            .then(function (r) { return r.json(); })
            .then(function (body) {
              if (body.code !== 0) {
                submitBtn.disabled = false;
                setProgress(false);
                saveTask(null);
                if (fromResume) {
                  msg.className = "";
                  msg.textContent = "";
                } else {
                  msg.className = "err";
                  msg.textContent = body.message || "进度查询失败";
                }
                return;
              }
              fromResume = false;
              var total = body.nTotal > 0 ? body.nTotal : 100;
              var pct = body.nProgress * 100 / total;
              if (body.nState === 1) {
                submitBtn.disabled = true;
                setProgress(true, pct, body.strMessage || "导入中", false);
                msg.className = "";
                msg.textContent = "导入进行中…";
                setTimeout(tick, 10000);
              } else if (body.nState === 2) {
                submitBtn.disabled = false;
                setProgress(false);
                saveTask(null);
                msg.className = "ok";
                var r = body.result || {};
                msg.textContent = "导入成功，新增 " + (r.successCount || 0) + " 条";
              } else {
                submitBtn.disabled = false;
                setProgress(false);
                saveTask(null);
                msg.className = "err";
                msg.textContent = body.strMessage || "导入失败";
              }
            })
            .catch(function () { setTimeout(tick, 10000); });
        }
        tick();
      }

      fileInput.addEventListener("change", function () {
        fileName.textContent = fileInput.files.length ? fileInput.files[0].name : "未选择文件";
        msg.textContent = "";
        msg.className = "";
      });

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        if (!fileInput.files.length) {
          msg.className = "err";
          msg.textContent = "请先选择文件";
          return;
        }
        var data = new FormData();
        data.append("file", fileInput.files[0]);
        submitBtn.disabled = true;
        msg.className = "";
        msg.textContent = "正在上传…";
        setProgress(true, 0, "上传中", false);

        var xhr = new XMLHttpRequest();
        xhr.open("POST", "/school/importExcel");
        xhr.upload.onprogress = function (ev) {
          if (!ev.lengthComputable) return;
          var pct = (ev.loaded / ev.total) * 100;
          setProgress(true, pct, "上传中", false);
          msg.textContent = "正在上传 " + Math.round(pct) + "%…";
        };
        xhr.upload.onload = function () {
          setProgress(true, 100, "等待服务端处理", true);
          msg.textContent = "上传完成，正在提交任务…";
        };
        xhr.onerror = function () {
          submitBtn.disabled = false;
          setProgress(false);
          msg.className = "err";
          msg.textContent = "请求失败，请确认服务已启动";
        };
        xhr.onload = function () {
          var body;
          try { body = JSON.parse(xhr.responseText || "{}"); }
          catch (err) {
            submitBtn.disabled = false;
            setProgress(false);
            msg.className = "err";
            msg.textContent = "响应解析失败";
            return;
          }
          if (xhr.status >= 200 && xhr.status < 300 && body.code === 0 && body.taskId) {
            msg.textContent = body.message || "导入任务已提交";
            poll(body.taskId);
          } else {
            submitBtn.disabled = false;
            setProgress(false);
            msg.className = "err";
            msg.textContent = body.message || "导入失败";
          }
        };
        xhr.send(data);
      });

      try {
        var existing = sessionStorage.getItem(TASK_KEY);
        if (existing) {
          poll(existing, true);
        }
      } catch (e) {}
    })();
  </script>
</body>
</html>
