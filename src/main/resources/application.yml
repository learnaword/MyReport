server:
  port: ${SERVER_PORT:9091}

spring:
  application:
    name: myreport

  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/report?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:interview}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    database-platform: org.hibernate.dialect.MySQL8Dialect
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:1}

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 22MB

# 模版封面/底图上传目录（其下会建 report-template/{id}/）
myreport:
  template-upload-dir: ${REPORT_TEMPLATE_UPLOAD_DIR:}
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      model: ${DASHSCOPE_MODEL:qwen-plus}
    chart-analyst:
      enabled: ${CHART_ANALYST_ENABLED:true}
